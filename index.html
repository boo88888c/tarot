<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>塔羅抽牌工具</title>
    <link rel="stylesheet" href="./styles.css?v=20260524-1" />
  </head>
  <body>
    <main class="app-shell">

      <!-- ── 左側：問題面板 ── -->
      <section class="question-panel" aria-labelledby="app-title">

        <div class="panel-brand">
          <p class="eyebrow">No API Tarot</p>
          <h1 id="app-title">塔羅抽牌工具</h1>
          <p class="tagline">專注你的問題，讓塔羅給你指引 <span class="gold-char">✦</span></p>
        </div>

        <div class="field-list">

          <div class="field">
            <label class="field-label" for="questionInput">
              <svg class="field-icon" viewBox="0 0 16 16" fill="none">
                <path d="M2 3.5A1.5 1.5 0 013.5 2h9A1.5 1.5 0 0114 3.5v5.5A1.5 1.5 0 0112.5 10.5H8.2L5.5 13V10.5H3.5A1.5 1.5 0 012 9V3.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
              </svg>
              問題
            </label>
            <div class="textarea-wrap">
              <textarea id="questionInput" rows="3" maxlength="300" placeholder="輸入這次想問的事情"></textarea>
              <span id="charCount" class="char-count">0/300</span>
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="topicInput">
              <svg class="field-icon" viewBox="0 0 16 16" fill="none">
                <path d="M8 1.5C5.8 1.5 4 3.3 4 5.5c0 3 4 9 4 9s4-6 4-9c0-2.2-1.8-4-4-4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                <circle cx="8" cy="5.5" r="1.5" stroke="currentColor" stroke-width="1.2"/>
              </svg>
              問題類型
            </label>
            <input id="topicInput" type="text" maxlength="24" placeholder="感情 / 工作 / 金錢…" />
          </div>

          <div class="field">
            <label class="field-label" for="spreadSelect">
              <svg class="field-icon" viewBox="0 0 16 16" fill="none">
                <rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
                <rect x="9.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
                <rect x="1.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
                <rect x="9.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
              </svg>
              占卜方式
            </label>
            <div class="select-wrap">
              <select id="spreadSelect"></select>
              <svg class="select-arrow" viewBox="0 0 10 6" fill="none">
                <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="interpretationInput">
              <svg class="field-icon" viewBox="0 0 16 16" fill="none">
                <path d="M8 1.5l1.4 4.3h4.5l-3.6 2.6 1.4 4.3L8 10.1l-3.7 2.6 1.4-4.3L2.1 5.8h4.5z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
              </svg>
              解牌方式
            </label>
            <input id="interpretationInput" type="text" maxlength="60" placeholder="心理分析 / 具體建議 / 時間軸…" />
          </div>

        </div>

        <div class="panel-footer">
          <button id="drawButton" class="primary-button" type="button">✦ 一鍵抽牌</button>
        </div>

      </section>

      <!-- ── 右側：抽牌面板 ── -->
      <section class="draw-panel" aria-live="polite">

        <div class="draw-header">
          <div>
            <h2 class="draw-panel-title">
              <span class="draw-panel-icon" aria-hidden="true">🃏</span>牌陣抽牌
            </h2>
            <p id="drawHint" class="draw-hint">選擇適合的牌陣，一鍵抽牌，系統會用瀏覽器高品質亂數自動抽出不重複的牌。</p>
          </div>
        </div>

        <!-- 抽牌動畫 -->
        <div id="drawingState" class="drawing-state" hidden>
          <span class="drawing-rune" aria-hidden="true">✦</span>
          <p class="drawing-label">抽牌中</p>
        </div>

        <section id="resultSection" class="result-section" hidden>

          <div class="section-heading">
            <span class="section-sparkle" aria-hidden="true">✦</span>
            <h2>抽到的牌</h2>
          </div>
          <div id="selectedCards" class="selected-cards"></div>

          <article class="prompt-card">
            <div class="prompt-card-header">
              <div>
                <p class="eyebrow">GPT Prompt</p>
                <h2>複製到 GPT 解讀</h2>
              </div>
              <div class="prompt-actions">
                <button id="copyPromptButton" class="secondary-button" type="button">
                  <svg viewBox="0 0 16 16" fill="none" width="13" height="13">
                    <rect x="5" y="5" width="9" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
                    <path d="M3 11H2.5A1.5 1.5 0 011 9.5v-8A1.5 1.5 0 012.5 0h7A1.5 1.5 0 0111 1.5V3" stroke="currentColor" stroke-width="1.3"/>
                  </svg>
                  複製
                </button>
              </div>
            </div>
            <textarea id="promptOutput" class="prompt-output" rows="7" readonly></textarea>
            <p id="copyStatus" class="copy-status" aria-live="polite"></p>
          </article>

        </section>


        <div class="link-section">
          <div class="section-heading">
            <span class="section-sparkle" aria-hidden="true">💬</span>
            <h2>連結</h2>
          </div>
          <div class="link-row">
            <input id="gptUrlInput" type="url" placeholder="貼上你的 GPTs 連結" />
            <button id="openLinkButton" class="secondary-button" type="button">
              <svg viewBox="0 0 16 16" fill="none" width="13" height="13">
                <path d="M7 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M10 2h4v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14 2L8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              開啟連結
            </button>
          </div>
        </div>

      </section>

    </main>
    <script type="module" src="./app.js?v=20260613-1"></script>
  </body>
</html>
